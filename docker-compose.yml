services:
  mysql:
    image: mysql:8.0
    container_name: vidaso-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-app_db}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -proot"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vidaso-backend
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      PORT: ${PORT:-3001}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      DATABASE_URL: ${DATABASE_URL:-mysql://root:root@mysql:3306/app_db}
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
